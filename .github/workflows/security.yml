# Reusable security pipeline (the "paved road").
#
# Invoked by ci.yml on this repo, and consumable by any other repo via:
#   jobs:
#     security:
#       uses: harsh02/Deterministic-risk-assessment/.github/workflows/security.yml@main
#
# Design principles (the Phase 2 learning goals):
#   * Shift-left in CI: the same scans as the local pre-commit hooks, but here
#     they CANNOT be bypassed with `git commit --no-verify`.
#   * SARIF everywhere: each scanner emits SARIF -> GitHub code scanning
#     aggregates them in one Security tab. Tools are interchangeable producers.
#   * Least privilege: top-level default-deny; each job requests only what it
#     needs. The GITHUB_TOKEN is not handed broad scope.
#   * Pipeline-as-attack-surface: every third-party action is pinned to a full
#     commit SHA (not a mutable tag), and Harden-Runner audits egress. This is
#     the direct lesson from the tj-actions/changed-files compromise (2025).

name: security

on:
  workflow_call:
    inputs:
      python-version:
        description: "Python version for SCA/SAST setup steps"
        type: string
        default: "3.11"

# Default-deny. Jobs opt into the minimal scopes they require.
permissions: {}

jobs:
  # ---------------------------------------------------------------------------
  # SAST 1 — Semgrep (community security rulesets + this repo's custom rules)
  # ---------------------------------------------------------------------------
  semgrep:
    name: SAST (Semgrep)
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write   # upload SARIF
    container:
      image: semgrep/semgrep:1.97.0
    steps:
      - name: Harden runner (audit egress)
        uses: step-security/harden-runner@ab7a9404c0f3da075243ca237b5fac12c98deaa5 # v2
        with:
          egress-policy: audit

      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      # p/security-audit + p/secrets are community rulesets; .semgrep/ holds the
      # repo's own custom rules (e.g. enforce SafeFormulaEvaluator, ban eval).
      - name: Run Semgrep
        run: |
          semgrep scan \
            --config p/security-audit \
            --config p/secrets \
            --config .semgrep/ \
            --sarif --output semgrep.sarif \
            --metrics off
        continue-on-error: true   # don't fail the job before SARIF is uploaded

      - name: Upload Semgrep SARIF
        uses: github/codeql-action/upload-sarif@03e4368ac7daa2bd82b3e85262f3bf87ee112f57 # v3
        with:
          sarif_file: semgrep.sarif
          category: semgrep

  # ---------------------------------------------------------------------------
  # SAST 2 — CodeQL (semantic taint/dataflow analysis)
  # ---------------------------------------------------------------------------
  codeql:
    name: SAST (CodeQL)
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
      actions: read
    steps:
      - name: Harden runner (audit egress)
        uses: step-security/harden-runner@ab7a9404c0f3da075243ca237b5fac12c98deaa5 # v2
        with:
          egress-policy: audit

      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Initialize CodeQL
        uses: github/codeql-action/init@03e4368ac7daa2bd82b3e85262f3bf87ee112f57 # v3
        with:
          languages: python
          # security-extended adds more (higher-FP) security queries on top of
          # the default high-precision set — appropriate for a learning project.
          queries: security-extended

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@03e4368ac7daa2bd82b3e85262f3bf87ee112f57 # v3
        with:
          category: codeql

  # ---------------------------------------------------------------------------
  # SCA 1 — pip-audit (Python dependency CVEs)
  # ---------------------------------------------------------------------------
  pip-audit:
    name: SCA (pip-audit)
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Harden runner (audit egress)
        uses: step-security/harden-runner@ab7a9404c0f3da075243ca237b5fac12c98deaa5 # v2
        with:
          egress-policy: audit

      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Set up Python
        uses: actions/setup-python@e797f83bcb11b83ae66e0230d6156d7c80228e7c # v5
        with:
          python-version: ${{ inputs.python-version }}

      - name: Install pip-audit
        run: python -m pip install pip-audit==2.7.3

      # Audit declared dependencies. Non-zero exit on a found vuln fails the job.
      - name: Run pip-audit
        run: pip-audit -r requirements.txt --strict --desc

  # ---------------------------------------------------------------------------
  # SCA 2 — OSV-Scanner (multi-source, Google's OSV database)
  # ---------------------------------------------------------------------------
  osv-scanner:
    name: SCA (OSV-Scanner)
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
    steps:
      - name: Harden runner (audit egress)
        uses: step-security/harden-runner@ab7a9404c0f3da075243ca237b5fac12c98deaa5 # v2
        with:
          egress-policy: audit

      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Run OSV-Scanner
        uses: google/osv-scanner-action/osv-scanner-action@9a498708959aeaef5ef730655706c5a1df1edbc2 # v2.3.8
        continue-on-error: true
        with:
          scan-args: |-
            --output=osv.sarif
            --format=sarif
            ./

      - name: Upload OSV SARIF
        uses: github/codeql-action/upload-sarif@03e4368ac7daa2bd82b3e85262f3bf87ee112f57 # v3
        with:
          sarif_file: osv.sarif
          category: osv-scanner

  # ---------------------------------------------------------------------------
  # Secrets — TruffleHog (verified: only reports secrets confirmed live)
  # ---------------------------------------------------------------------------
  secrets:
    name: Secrets (TruffleHog)
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Harden runner (audit egress)
        uses: step-security/harden-runner@ab7a9404c0f3da075243ca237b5fac12c98deaa5 # v2
        with:
          egress-policy: audit

      - name: Checkout (full history for diff scanning)
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0

      - name: Run TruffleHog
        uses: trufflesecurity/trufflehog@9f0b97f1600cd5f51e5ecb8380087807acb790f9 # main
        with:
          extra_args: --results=verified,unknown

  # ---------------------------------------------------------------------------
  # Posture — OpenSSF Scorecard (automated repo security posture score)
  # ---------------------------------------------------------------------------
  scorecard:
    name: Posture (Scorecard)
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
      id-token: write   # OIDC, lets Scorecard publish results
    steps:
      - name: Harden runner (audit egress)
        uses: step-security/harden-runner@ab7a9404c0f3da075243ca237b5fac12c98deaa5 # v2
        with:
          egress-policy: audit

      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false

      - name: Run Scorecard
        uses: ossf/scorecard-action@4eaacf0543bb3f2c246792bd56e8cdeffafb205a # v2.4.3
        with:
          results_file: scorecard.sarif
          results_format: sarif
          publish_results: false

      - name: Upload Scorecard SARIF
        uses: github/codeql-action/upload-sarif@03e4368ac7daa2bd82b3e85262f3bf87ee112f57 # v3
        with:
          sarif_file: scorecard.sarif
          category: scorecard

  # ---------------------------------------------------------------------------
  # Policy-as-code — Conftest (Rego) over the workflow files themselves.
  # Enforces the pipeline-hardening invariants we care about (pinned actions,
  # no broad permissions). Compliance-as-code: the rules are versioned + tested.
  # ---------------------------------------------------------------------------
  policy:
    name: Policy-as-code (Conftest)
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Harden runner (audit egress)
        uses: step-security/harden-runner@ab7a9404c0f3da075243ca237b5fac12c98deaa5 # v2
        with:
          egress-policy: audit

      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Run Conftest on workflow files
        run: |
          curl -sSfL https://github.com/open-policy-agent/conftest/releases/download/v0.56.0/conftest_0.56.0_Linux_x86_64.tar.gz \
            | tar xz conftest
          ./conftest test --policy policy/cicd .github/workflows/security.yml .github/workflows/ci.yml

  # ---------------------------------------------------------------------------
  # Container — build, scan, inventory (SBOM), sign, and attest the image.
  # Phase 3 supply-chain centerpiece:
  #   build -> Trivy scan (SARIF) -> Syft SBOM -> (on main) push to GHCR
  #         -> SLSA build provenance attestation -> Cosign keyless signature
  #
  # On pull_request we BUILD + SCAN + SBOM only (nothing is published, and forks
  # have no registry creds). On push to main we additionally push, sign, and
  # attest — you only sign artifacts you actually intend to ship.
  # ---------------------------------------------------------------------------
  container:
    name: Container (build, scan, SBOM, sign)
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write         # push image to GHCR
      security-events: write  # upload Trivy SARIF
      id-token: write         # Cosign keyless (OIDC) + SLSA provenance
      attestations: write     # actions/attest-build-provenance
    env:
      REGISTRY: ghcr.io
    steps:
      - name: Harden runner (audit egress)
        uses: step-security/harden-runner@ab7a9404c0f3da075243ca237b5fac12c98deaa5 # v2
        with:
          egress-policy: audit

      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      # OCI references must be lowercase, but github.repository preserves the
      # repo's mixed case (…/Deterministic-risk-assessment). Compute a lowercase
      # image name once and reuse it everywhere (build, scan, sign, attest).
      - name: Compute lowercase image name
        id: img
        run: echo "name=${REGISTRY}/$(echo '${{ github.repository }}' | tr '[:upper:]' '[:lower:]')" >> "$GITHUB_OUTPUT"

      # Authenticate to the registry only when we intend to publish (push to main).
      - name: Log in to GHCR
        if: github.event_name == 'push'
        uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Derive image tags/labels
        id: meta
        uses: docker/metadata-action@c299e40c65443455700f0fdfc63efafe5b349051 # v5
        with:
          images: ${{ steps.img.outputs.name }}
          tags: |
            type=sha,format=long
            type=ref,event=branch
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}

      # Build+load on PRs (scan locally); build+push by digest on main.
      - name: Build image
        id: build
        uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8 # v6
        with:
          context: .
          push: ${{ github.event_name == 'push' }}
          load: ${{ github.event_name == 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          provenance: false   # provenance is attested explicitly below

      # Reference the image by immutable digest after a push; by local tag on PRs.
      - name: Resolve image ref
        id: ref
        env:
          IMAGE: ${{ steps.img.outputs.name }}
          DIGEST: ${{ steps.build.outputs.digest }}
        run: |
          if [ "${{ github.event_name }}" = "push" ]; then
            echo "image=${IMAGE}@${DIGEST}" >> "$GITHUB_OUTPUT"
          else
            echo "image=${{ fromJSON(steps.meta.outputs.json).tags[0] }}" >> "$GITHUB_OUTPUT"
          fi

      # --- Scan the built image for OS + language CVEs -----------------------
      - name: Trivy image scan (SARIF)
        uses: aquasecurity/trivy-action@314ff8b43182423b84c50b1670b0e10f858f2d98 # master
        with:
          scan-type: image
          image-ref: ${{ steps.ref.outputs.image }}
          format: sarif
          output: trivy.sarif
          ignore-unfixed: true
          vuln-type: os,library

      - name: Upload Trivy SARIF
        uses: github/codeql-action/upload-sarif@03e4368ac7daa2bd82b3e85262f3bf87ee112f57 # v3
        with:
          sarif_file: trivy.sarif
          category: trivy

      # --- Software Bill of Materials ----------------------------------------
      - name: Generate SBOM (Syft, CycloneDX)
        uses: anchore/sbom-action@e22c389904149dbc22b58101806040fa8d37a610 # v0
        with:
          image: ${{ steps.ref.outputs.image }}
          format: cyclonedx-json
          output-file: sbom.cyclonedx.json
          upload-artifact: true

      # --- Provenance + signing (publish path only) --------------------------
      - name: Install Cosign
        if: github.event_name == 'push'
        uses: sigstore/cosign-installer@398d4b0eeef1380460a10c8013a76f728fb906ac # v3

      - name: Sign image (keyless / Sigstore OIDC)
        if: github.event_name == 'push'
        run: cosign sign --yes "${IMAGE}@${DIGEST}"
        env:
          IMAGE: ${{ steps.img.outputs.name }}
          DIGEST: ${{ steps.build.outputs.digest }}

      - name: Attest SLSA build provenance
        if: github.event_name == 'push'
        uses: actions/attest-build-provenance@ef244123eb79f2f7a7e75d99086184180e6d0018 # v1
        with:
          subject-name: ${{ steps.img.outputs.name }}
          subject-digest: ${{ steps.build.outputs.digest }}
          push-to-registry: true
